<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>SMC ใน 7 บทเรียน</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0D1117;
    --bg-2:#0A0E14;
    --card:#161B22;
    --card-2:#1C2230;
    --border:#30363D;
    --border-2:#21262D;
    --text:#E6EDF3;
    --text-2:#9DA7B3;
    --text-3:#6E7681;
    --green:#26A69A;
    --red:#EF5350;
    --blue:#2962FF;
    --yellow:#F5A623;
    --purple:#A78BFA;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'IBM Plex Sans Thai',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  body{min-height:100vh;overflow-x:hidden}
  ::selection{background:rgba(41,98,255,.35)}
  button{font-family:inherit}
  /* scrollbar */
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-track{background:var(--bg-2)}
  ::-webkit-scrollbar-thumb{background:#262c36;border-radius:6px}
  ::-webkit-scrollbar-thumb:hover{background:#343b46}

  /* layout */
  .app{display:grid;grid-template-columns:280px 1fr;min-height:100vh}
  .sidebar{position:sticky;top:0;height:100vh;background:var(--bg-2);border-right:1px solid var(--border-2);padding:22px 18px;overflow-y:auto}
  .main{min-width:0}
  .container{max-width:920px;margin:0 auto;padding:0 32px}
  @media (max-width:900px){
    .app{grid-template-columns:1fr}
    .sidebar{position:fixed;top:0;left:0;width:280px;z-index:50;transform:translateX(-100%);transition:transform .25s ease;box-shadow:20px 0 60px rgba(0,0,0,.5)}
    .sidebar.open{transform:translateX(0)}
    .container{padding:0 20px}
    .menu-btn{display:flex !important}
  }

  /* sidebar */
  .brand{display:flex;align-items:center;gap:10px;padding:6px 8px 22px;border-bottom:1px solid var(--border-2);margin-bottom:18px}
  .brand-mark{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,#26A69A 0%,#2962FF 100%);display:grid;place-items:center;font-weight:700;color:#0D1117;font-size:14px;font-family:'JetBrains Mono'}
  .brand-title{font-weight:600;font-size:15px;letter-spacing:.2px}
  .brand-sub{font-size:11px;color:var(--text-3);font-family:'JetBrains Mono';text-transform:uppercase;letter-spacing:1px;margin-top:2px}

  .nav-label{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:1.5px;padding:0 10px;margin:14px 0 8px;font-family:'JetBrains Mono'}
  .nav{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:2px}
  .nav-item{display:flex;align-items:center;gap:12px;padding:10px 10px;border-radius:8px;cursor:pointer;transition:background .15s;color:var(--text-2);font-size:14px;border:1px solid transparent}
  .nav-item:hover{background:#10161f;color:var(--text)}
  .nav-item.active{background:#182032;color:var(--text);border-color:#253049}
  .nav-num{width:22px;height:22px;border-radius:6px;background:#1d242f;color:var(--text-2);font-family:'JetBrains Mono';font-size:11px;display:grid;place-items:center;flex-shrink:0;border:1px solid var(--border-2)}
  .nav-item.active .nav-num{background:var(--blue);color:#fff;border-color:var(--blue)}
  .nav-item.done .nav-num{background:var(--green);color:#05221f;border-color:var(--green)}
  .nav-check{margin-left:auto;font-size:12px;opacity:0;transition:opacity .15s}
  .nav-item.done .nav-check{opacity:1;color:var(--green)}

  .progress-wrap{margin:18px 10px 6px}
  .progress-row{display:flex;justify-content:space-between;font-size:11px;color:var(--text-3);font-family:'JetBrains Mono';margin-bottom:6px;letter-spacing:.5px}
  .progress-bar{height:4px;background:#1a2029;border-radius:2px;overflow:hidden}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--green) 0%,var(--blue) 100%);transition:width .4s cubic-bezier(.2,.8,.2,1)}

  /* topbar (mobile) */
  .menu-btn{display:none;align-items:center;justify-content:center;position:fixed;top:14px;right:14px;z-index:60;width:42px;height:42px;border-radius:10px;background:var(--card);border:1px solid var(--border);color:var(--text);cursor:pointer}

  /* hero */
  .hero{padding:90px 0 70px;position:relative;overflow:hidden}
  .hero::before{content:"";position:absolute;inset:0;background:
    radial-gradient(800px 400px at 20% 0%,rgba(41,98,255,.08),transparent 60%),
    radial-gradient(600px 300px at 90% 30%,rgba(38,166,154,.06),transparent 60%);
    pointer-events:none}
  .eyebrow{display:inline-flex;align-items:center;gap:8px;padding:5px 12px;border:1px solid var(--border);border-radius:999px;font-family:'JetBrains Mono';font-size:11px;color:var(--text-2);text-transform:uppercase;letter-spacing:1.5px;background:rgba(22,27,34,.6)}
  .eyebrow .dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 10px var(--green);animation:pulse 2s infinite}
  @keyframes pulse{50%{opacity:.4}}
  h1.hero-title{font-size:clamp(38px,5.4vw,64px);font-weight:700;line-height:1.08;letter-spacing:-.01em;margin:20px 0 18px;text-wrap:balance}
  .hero-title .grad{background:linear-gradient(120deg,#26A69A 0%,#2962FF 80%);-webkit-background-clip:text;background-clip:text;color:transparent}
  .hero-sub{font-size:18px;color:var(--text-2);max-width:620px;line-height:1.7;margin:0 0 34px}
  .hero-actions{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  .btn{padding:14px 22px;border-radius:10px;font-size:15px;font-weight:500;cursor:pointer;border:1px solid transparent;display:inline-flex;align-items:center;gap:10px;transition:all .15s;text-decoration:none}
  .btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
  .btn-primary:hover{background:#1c50e5;transform:translateY(-1px)}
  .btn-ghost{background:transparent;color:var(--text);border-color:var(--border)}
  .btn-ghost:hover{background:var(--card);border-color:#3d4654}
  .hero-stats{display:flex;gap:32px;margin-top:46px;flex-wrap:wrap}
  .stat{display:flex;flex-direction:column;gap:2px}
  .stat-num{font-size:26px;font-family:'JetBrains Mono';font-weight:600;color:var(--text)}
  .stat-lbl{font-size:12px;color:var(--text-3);text-transform:uppercase;letter-spacing:1px;font-family:'JetBrains Mono'}

  .hero-visual{margin-top:60px;border:1px solid var(--border);border-radius:14px;background:var(--card);padding:20px;position:relative;overflow:hidden}
  .hero-visual::before{content:"";position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(41,98,255,.4),transparent)}

  /* section */
  section.lesson{padding:70px 0;border-top:1px solid var(--border-2);position:relative}
  .lesson-header{margin-bottom:36px}
  .lesson-tag{display:inline-flex;align-items:center;gap:10px;font-family:'JetBrains Mono';font-size:12px;color:var(--text-3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:14px}
  .lesson-tag .n{background:#1a2332;color:var(--blue);padding:3px 8px;border-radius:4px;border:1px solid #23324a}
  h2.lesson-title{font-size:clamp(28px,3.4vw,40px);font-weight:700;letter-spacing:-.01em;margin:0 0 12px;line-height:1.15;text-wrap:balance}
  .lesson-desc{font-size:16px;color:var(--text-2);line-height:1.75;max-width:680px}

  .card{background:var(--card);border:1px solid var(--border-2);border-radius:14px;padding:24px;margin-top:20px}
  .card h3{margin:0 0 8px;font-size:17px;font-weight:600}
  .card p{margin:0;color:var(--text-2);font-size:14px;line-height:1.75}

  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  @media (max-width:780px){.grid-2{grid-template-columns:1fr}}

  /* chart frame */
  .chart{background:#0b0f14;border:1px solid var(--border-2);border-radius:12px;padding:18px;position:relative}
  .chart-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:12px;flex-wrap:wrap}
  .chart-title{font-family:'JetBrains Mono';font-size:12px;color:var(--text-3);text-transform:uppercase;letter-spacing:1.2px}
  .chart-controls{display:flex;gap:6px;flex-wrap:wrap}
  .chip{background:#161b22;border:1px solid var(--border);color:var(--text-2);padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-family:'JetBrains Mono';transition:all .12s}
  .chip:hover{color:var(--text);border-color:#3d4654}
  .chip.active{background:var(--blue);color:#fff;border-color:var(--blue)}
  .chip.g{background:rgba(38,166,154,.1);color:var(--green);border-color:rgba(38,166,154,.35)}
  .chip.r{background:rgba(239,83,80,.1);color:var(--red);border-color:rgba(239,83,80,.35)}

  .legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:10px;font-family:'JetBrains Mono';font-size:11px;color:var(--text-3)}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .legend i{width:10px;height:10px;border-radius:2px;display:inline-block}

  /* quiz */
  .quiz{margin-top:24px;background:linear-gradient(180deg,rgba(41,98,255,.05) 0%,transparent 100%);border:1px solid #1d2940;border-radius:14px;padding:22px}
  .quiz-q{font-size:16px;font-weight:500;margin:0 0 14px}
  .quiz-opts{display:grid;gap:8px}
  .opt{text-align:left;background:var(--card);border:1px solid var(--border-2);color:var(--text);padding:13px 16px;border-radius:10px;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:12px;transition:all .12s;width:100%}
  .opt:hover:not(:disabled){border-color:#3d4654;background:#1a2230}
  .opt:disabled{cursor:default;opacity:.8}
  .opt .letter{width:22px;height:22px;border-radius:5px;background:#1d242f;color:var(--text-2);font-family:'JetBrains Mono';font-size:11px;display:grid;place-items:center;flex-shrink:0}
  .opt.correct{border-color:var(--green);background:rgba(38,166,154,.08)}
  .opt.correct .letter{background:var(--green);color:#05221f}
  .opt.wrong{border-color:var(--red);background:rgba(239,83,80,.08)}
  .opt.wrong .letter{background:var(--red);color:#2a0909}
  .quiz-fb{margin-top:14px;padding:12px 14px;border-radius:8px;font-size:13px;line-height:1.6;border:1px solid}
  .quiz-fb.ok{background:rgba(38,166,154,.08);border-color:rgba(38,166,154,.3);color:#a6e4dc}
  .quiz-fb.no{background:rgba(239,83,80,.08);border-color:rgba(239,83,80,.3);color:#f5b1ae}

  /* table */
  .cmp-table{width:100%;border-collapse:collapse;margin-top:16px;font-size:14px}
  .cmp-table th,.cmp-table td{padding:12px 14px;text-align:left;border-bottom:1px solid var(--border-2)}
  .cmp-table th{font-family:'JetBrains Mono';font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text-3);font-weight:500}
  .cmp-table tr:last-child td{border-bottom:none}
  .cmp-table td:first-child{color:var(--text-3);font-family:'JetBrains Mono';font-size:12px;width:30%}

  /* checklist */
  .checklist{margin-top:14px;display:grid;gap:8px}
  .check-row{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;background:#10161f;border:1px solid var(--border-2);border-radius:10px;font-size:14px;color:var(--text-2);line-height:1.6}
  .check-row .ico{width:20px;height:20px;border-radius:50%;display:grid;place-items:center;flex-shrink:0;font-size:11px;font-weight:700;margin-top:1px}
  .check-row.good .ico{background:rgba(38,166,154,.15);color:var(--green)}
  .check-row.bad .ico{background:rgba(239,83,80,.15);color:var(--red)}

  /* mark complete bar */
  .mark-bar{margin-top:28px;display:flex;justify-content:space-between;align-items:center;padding:16px 20px;background:rgba(22,27,34,.6);border:1px solid var(--border-2);border-radius:12px;flex-wrap:wrap;gap:12px}
  .mark-bar .done-state{display:flex;align-items:center;gap:10px;color:var(--text-2);font-size:13px}
  .mark-bar.done{background:rgba(38,166,154,.06);border-color:rgba(38,166,154,.3)}
  .mark-bar.done .done-state{color:var(--green)}

  /* practice */
  .prac-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:20px}
  @media (max-width:780px){.prac-grid{grid-template-columns:1fr}}
  .prac-card{background:var(--card);border:1px solid var(--border-2);border-radius:12px;padding:16px}
  .prac-card .chart{padding:10px}
  .prac-q{font-size:14px;margin:12px 0 10px;color:var(--text)}
  .prac-opts{display:flex;flex-wrap:wrap;gap:6px}
  .prac-opt{padding:7px 12px;background:#10161f;border:1px solid var(--border-2);border-radius:6px;font-size:12px;color:var(--text-2);cursor:pointer;font-family:'JetBrains Mono'}
  .prac-opt:hover{border-color:#3d4654;color:var(--text)}
  .prac-opt.sel{background:var(--blue);color:#fff;border-color:var(--blue)}
  .prac-opt.sel.correct{background:var(--green);border-color:var(--green)}
  .prac-opt.sel.wrong{background:var(--red);border-color:var(--red)}
  .prac-opt.show-ans{border-color:var(--green);color:var(--green)}

  /* slider */
  .slider-wrap{margin-top:14px;display:flex;align-items:center;gap:14px;padding:14px 16px;background:#10161f;border:1px solid var(--border-2);border-radius:10px;font-family:'JetBrains Mono';font-size:12px;color:var(--text-2)}
  input[type=range]{flex:1;-webkit-appearance:none;appearance:none;height:4px;background:#262c36;border-radius:2px;outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:16px;height:16px;background:var(--blue);border-radius:50%;cursor:pointer;border:2px solid #0b0f14}
  input[type=range]::-moz-range-thumb{width:16px;height:16px;background:var(--blue);border-radius:50%;cursor:pointer;border:2px solid #0b0f14}

  /* price ticks */
  .ticks{font-family:'JetBrains Mono';font-size:10px;fill:#4a5463}

  /* footer */
  footer{padding:60px 0 40px;border-top:1px solid var(--border-2);margin-top:60px;color:var(--text-3);font-size:13px;line-height:1.7}
  .foot-grid{display:grid;grid-template-columns:2fr 1fr 1fr;gap:30px;margin-bottom:30px}
  @media (max-width:780px){.foot-grid{grid-template-columns:1fr}}
  footer h4{color:var(--text);font-size:13px;font-weight:600;margin:0 0 12px;font-family:'JetBrains Mono';text-transform:uppercase;letter-spacing:1.2px}
  footer a{color:var(--text-2);text-decoration:none;display:block;padding:4px 0}
  footer a:hover{color:var(--blue)}
  .disclaimer{padding:16px;background:rgba(245,166,35,.06);border:1px solid rgba(245,166,35,.25);border-radius:10px;color:#d4a95c;font-size:12px;line-height:1.7}

  /* resources */
  .res-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:20px}
  @media (max-width:780px){.res-grid{grid-template-columns:1fr}}
  .res-card{background:var(--card);border:1px solid var(--border-2);border-radius:12px;padding:20px;cursor:pointer;transition:all .15s;text-decoration:none;color:inherit;display:block}
  .res-card:hover{border-color:#3d4654;transform:translateY(-2px)}
  .res-ico{width:40px;height:40px;border-radius:10px;display:grid;place-items:center;margin-bottom:12px;font-family:'JetBrains Mono';font-weight:600}
  .res-card h4{margin:0 0 4px;font-size:15px;color:var(--text)}
  .res-card p{margin:0;font-size:12px;color:var(--text-3);line-height:1.6}

  /* fade-in on view */
  .reveal{opacity:0;transform:translateY(12px);transition:opacity .6s ease,transform .6s ease}
  .reveal.in{opacity:1;transform:none}

  /* scroll margin so anchor lands below anything sticky */
  [id^=lesson-],[id=hero],[id=practice],[id=resources]{scroll-margin-top:20px}

  /* step dots */
  .steps{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
  .step-dot{padding:7px 14px;background:#10161f;border:1px solid var(--border-2);border-radius:6px;font-family:'JetBrains Mono';font-size:11px;color:var(--text-2);cursor:pointer;display:flex;align-items:center;gap:8px}
  .step-dot .num{width:16px;height:16px;border-radius:50%;background:#21262D;color:var(--text-2);font-size:10px;display:grid;place-items:center}
  .step-dot.active{background:rgba(41,98,255,.15);color:var(--blue);border-color:rgba(41,98,255,.4)}
  .step-dot.active .num{background:var(--blue);color:#fff}

  /* tooltip */
  .ttip{position:absolute;background:#0b0f14;border:1px solid var(--border);padding:8px 12px;border-radius:8px;font-size:12px;color:var(--text);pointer-events:none;z-index:10;white-space:nowrap;font-family:'JetBrains Mono';box-shadow:0 10px 30px rgba(0,0,0,.5);opacity:0;transition:opacity .15s}
  .ttip.show{opacity:1}
  .ttip b{color:var(--blue)}

  /* pill badges */
  .pill{display:inline-flex;padding:3px 9px;background:#1a2332;color:var(--text-2);border-radius:999px;font-size:11px;font-family:'JetBrains Mono';border:1px solid var(--border-2)}
  .pill.g{background:rgba(38,166,154,.12);color:var(--green);border-color:rgba(38,166,154,.3)}
  .pill.r{background:rgba(239,83,80,.12);color:var(--red);border-color:rgba(239,83,80,.3)}
  .pill.b{background:rgba(41,98,255,.12);color:#7da4ff;border-color:rgba(41,98,255,.3)}
  .pill.y{background:rgba(245,166,35,.12);color:var(--yellow);border-color:rgba(245,166,35,.3)}

  /* completion banner */
  .complete-banner{margin-top:30px;padding:24px;border-radius:14px;background:linear-gradient(135deg,rgba(38,166,154,.1) 0%,rgba(41,98,255,.08) 100%);border:1px solid rgba(38,166,154,.3);text-align:center}
  .complete-banner h3{margin:0 0 6px;font-size:18px}
  .complete-banner p{margin:0;color:var(--text-2);font-size:13px}
</style>
</head>
<body>

<button id="menu-btn" class="menu-btn" aria-label="menu">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
</button>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="charts.jsx"></script>
<script type="text/babel" src="lessons.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

</body>
</html>
